openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Language Learning API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: lessons
    description: Lesson operations
  - name: progress
    description: User progress operations
  - name: achievements
    description: Achievement/badge operations
  - name: notebook
    description: Word notebook operations
  - name: leaderboard
    description: Leaderboard operations
  - name: community
    description: Community lesson authoring and discovery
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current auth state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"
  /auth/register:
    post:
      operationId: registerWithEmail
      tags: [auth]
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRegisterRequest"
      responses:
        "200":
          description: Registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthActionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /auth/login-email:
    post:
      operationId: loginWithEmail
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLoginRequest"
      responses:
        "200":
          description: Login result with session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthActionResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /auth/verify-email:
    get:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email address via token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthActionResult"
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Always returns ok (to avoid email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthActionResult"
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthActionResult"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /lessons:
    get:
      operationId: getLessons
      tags: [lessons]
      summary: Get all lessons
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"
  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a specific lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson details with words and questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"
  /progress:
    get:
      operationId: getProgress
      tags: [progress]
      summary: Get user progress
      responses:
        "200":
          description: User progress info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
  /progress/complete-lesson:
    post:
      operationId: completeLesson
      tags: [progress]
      summary: Mark a lesson as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteLessonRequest"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
  /progress/reset:
    post:
      operationId: resetProgress
      tags: [progress]
      summary: Reset all progress
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"
  /progress/set-daily-goal:
    post:
      operationId: setDailyGoal
      tags: [progress]
      summary: Set daily XP goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetDailyGoalRequest"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
  /achievements:
    get:
      operationId: getAchievements
      tags: [achievements]
      summary: Get all achievements with unlock status
      responses:
        "200":
          description: List of achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"
  /notebook:
    get:
      operationId: getNotebook
      tags: [notebook]
      summary: Get user word notebook
      responses:
        "200":
          description: List of saved words
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotebookWord"
    post:
      operationId: addToNotebook
      tags: [notebook]
      summary: Add a word to notebook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToNotebookRequest"
      responses:
        "200":
          description: Added word
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotebookWord"
  /notebook/{id}:
    delete:
      operationId: removeFromNotebook
      tags: [notebook]
      summary: Remove a word from notebook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top users by XP
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
  /community-lessons:
    get:
      operationId: getCommunityLessons
      tags: [community]
      summary: Get published community lessons
      responses:
        "200":
          description: Published community lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityLessonSummary"
    post:
      operationId: createCommunityLesson
      tags: [community]
      summary: Create a community lesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityLessonInput"
      responses:
        "201":
          description: Created lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityLessonDetail"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /community-lessons/mine:
    get:
      operationId: getMyCommunityLessons
      tags: [community]
      summary: Get current user's community lessons
      responses:
        "200":
          description: Owned drafts and published lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityLessonSummary"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /community-lessons/{id}:
    get:
      operationId: getCommunityLesson
      tags: [community]
      summary: Get a published lesson or an owned draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full lesson payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityLessonDetail"
        "404":
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
    put:
      operationId: updateCommunityLesson
      tags: [community]
      summary: Update an owned community lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityLessonInput"
      responses:
        "200":
          description: Updated lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityLessonDetail"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
      required: [id]
    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
      required: [user]
    Lesson:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        xpReward:
          type: integer
        wordCount:
          type: integer
        completed:
          type: boolean
        locked:
          type: boolean
        icon:
          type: string
      required: [id, title, description, category, difficulty, xpReward, wordCount, completed, locked, icon]
    Word:
      type: object
      properties:
        id:
          type: integer
        english:
          type: string
        turkish:
          type: string
        pronunciation:
          type: string
        example:
          type: string
        exampleTurkish:
          type: string
      required: [id, english, turkish, pronunciation, example, exampleTurkish]
    Question:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [translate-to-english, translate-to-turkish, multiple-choice, fill-blank, listen-and-write]
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        hint:
          type: string
      required: [id, type, question, correctAnswer]
    LessonDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
        xpReward:
          type: integer
        words:
          type: array
          items:
            $ref: "#/components/schemas/Word"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required: [id, title, description, category, difficulty, xpReward, words, questions]
    UserProgress:
      type: object
      properties:
        xp:
          type: integer
        streak:
          type: integer
        level:
          type: integer
        completedLessons:
          type: array
          items:
            type: integer
        hearts:
          type: integer
        totalLessonsCompleted:
          type: integer
        dailyGoalXp:
          type: integer
        dailyXpEarned:
          type: integer
        longestStreak:
          type: integer
      required: [xp, streak, level, completedLessons, hearts, totalLessonsCompleted, dailyGoalXp, dailyXpEarned, longestStreak]
    CompleteLessonRequest:
      type: object
      properties:
        lessonId:
          type: integer
        score:
          type: integer
      required: [lessonId, score]
    SetDailyGoalRequest:
      type: object
      properties:
        goalXp:
          type: integer
      required: [goalXp]
    ResetResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]
    Achievement:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        xpReward:
          type: integer
        unlocked:
          type: boolean
        unlockedAt:
          type: string
          nullable: true
        condition:
          type: string
      required: [id, title, description, icon, xpReward, unlocked, condition]
    NotebookWord:
      type: object
      properties:
        id:
          type: string
        english:
          type: string
        turkish:
          type: string
        pronunciation:
          type: string
          nullable: true
        example:
          type: string
          nullable: true
        lessonId:
          type: integer
          nullable: true
        addedAt:
          type: string
        reviewCount:
          type: integer
        known:
          type: boolean
      required: [id, english, turkish, reviewCount, known, addedAt]
    AddToNotebookRequest:
      type: object
      properties:
        english:
          type: string
        turkish:
          type: string
        pronunciation:
          type: string
          nullable: true
        example:
          type: string
          nullable: true
        lessonId:
          type: integer
          nullable: true
      required: [english, turkish]
    EmailRegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
      required: [email, password, name]
    EmailLoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
      required: [email]
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
      required: [token, password]
    AuthActionResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]
    AuthError:
      type: object
      properties:
        error:
          type: string
      required: [error]
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        xp:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        profileImageUrl:
          type: string
          nullable: true
        isCurrentUser:
          type: boolean
      required: [rank, userId, displayName, xp, level, streak, isCurrentUser]
    CommunityWord:
      type: object
      properties:
        id:
          type: string
        term:
          type: string
        translation:
          type: string
        example:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
      required: [id, term, translation]
    CommunityExercisePair:
      type: object
      properties:
        id:
          type: string
        left:
          type: string
        right:
          type: string
      required: [id, left, right]
    CommunityExercise:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [multiple-choice, matching, fill-blank, speech-to-text, translate-written]
        prompt:
          type: string
        instructions:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
        correctAnswers:
          type: array
          items:
            type: string
        pairs:
          type: array
          items:
            $ref: "#/components/schemas/CommunityExercisePair"
        voiceText:
          type: string
          nullable: true
        sourceText:
          type: string
          nullable: true
        hint:
          type: string
          nullable: true
        explanation:
          type: string
          nullable: true
      required: [id, type, prompt]
    CommunityAuthor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]
    CommunityLessonSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        sourceLanguage:
          type: string
        targetLanguage:
          type: string
        icon:
          type: string
        tags:
          type: array
          items:
            type: string
        objectives:
          type: array
          items:
            type: string
        estimatedMinutes:
          type: integer
        playCount:
          type: integer
        isPublished:
          type: boolean
        wordCount:
          type: integer
        exerciseCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isOwner:
          type: boolean
        author:
          $ref: "#/components/schemas/CommunityAuthor"
      required:
        [id, title, description, category, difficulty, sourceLanguage, targetLanguage, icon, tags, objectives, estimatedMinutes, playCount, isPublished, wordCount, exerciseCount, createdAt, updatedAt, isOwner, author]
    CommunityLessonDetail:
      allOf:
        - $ref: "#/components/schemas/CommunityLessonSummary"
        - type: object
          properties:
            words:
              type: array
              items:
                $ref: "#/components/schemas/CommunityWord"
            exercises:
              type: array
              items:
                $ref: "#/components/schemas/CommunityExercise"
          required: [words, exercises]
    CommunityLessonInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        sourceLanguage:
          type: string
        targetLanguage:
          type: string
        icon:
          type: string
        tags:
          type: array
          items:
            type: string
        objectives:
          type: array
          items:
            type: string
        estimatedMinutes:
          type: integer
        isPublished:
          type: boolean
        words:
          type: array
          items:
            $ref: "#/components/schemas/CommunityWord"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/CommunityExercise"
      required:
        [title, description, category, difficulty, sourceLanguage, targetLanguage, icon, tags, objectives, estimatedMinutes, isPublished, words, exercises]
