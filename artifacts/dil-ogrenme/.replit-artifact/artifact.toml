kind = "web"
previewPath = "/"
title = "İngilizce Öğren"
version = "1.0.0"
id = "artifacts/dil-ogrenme"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25123

[services.development]
run = "pnpm --filter @workspace/dil-ogrenme run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dil-ogrenme", "run", "build" ]
publicDir = "artifacts/dil-ogrenme/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25123"
BASE_PATH = "/"
